<!DOCTYPE html>
<html lang="id">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Konfirmasi Pembayaran - Bakule Lele</title>
	<link rel="shortcut icon" type="image/x-icon" href="assets/img/lele-icon.png">
	<link rel="stylesheet" href="assets/css/bootstrap-5.0.0-beta2.min.css">
	<link rel="stylesheet" href="assets/css/main.css">

	<style>
		body {
			background: #f7fff3;
		}
	</style>
</head>

<body>
	<section class="payment-success">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-lg-6">
					<div class="success-card">
						<div class="success-icon">✓</div>
						<h1>Pembayaran Selesai</h1>
						<p>Silakan lanjutkan ke WhatsApp untuk mengirim detail pesanan ke admin Bakule Lele.</p>

						<div class="order-preview" id="orderPreview"></div>

						<a id="waLink" class="wa-btn" href="#" target="_blank">
							Kirim Konfirmasi ke WhatsApp
						</a>
					</div>
				</div>
			</div>
		</div>
	</section>

	<script>
		const adminWhatsApp = '6287705630047';
		const params = new URLSearchParams(window.location.search);

		const gatewayTransactionId =
			params.get('transaction_id') ||
			params.get('order_id') ||
			params.get('invoice_id') ||
			params.get('reference');

		const localTransactionId = `BL-${Date.now()}`;
		const transactionId = gatewayTransactionId || localTransactionId;

		const orderData = JSON.parse(localStorage.getItem('bakuleLeleOrder')) || {
			name: 'Belum terisi',
			address: 'Belum terisi',
			phone: 'Belum terisi',
			kg: '-',
			total: '-',
			method: 'QRIS',
			orderTime: new Date().toLocaleString('id-ID', {
				dateStyle: 'full',
				timeStyle: 'short'
			})
		};

		const message = `Halo Admin Bakule Lele, saya sudah melakukan pembayaran.

ID Transaksi: ${transactionId}
Tanggal/Jam Pesan: ${orderData.orderTime}

Nama: ${orderData.name}
Alamat: ${orderData.address}
No WhatsApp: ${orderData.phone}

Pembelian: ${orderData.kg} kg lele
Total Pembayaran: ${orderData.total}
Metode Pembayaran: ${orderData.method}

Mohon diproses ya.`;

		const waUrl = `https://wa.me/${adminWhatsApp}?text=${encodeURIComponent(message)}`;

		document.getElementById('orderPreview').innerHTML = `
			<p><strong>ID Transaksi:</strong> ${transactionId}</p>
			<p><strong>Tanggal/Jam:</strong> ${orderData.orderTime}</p>
			<p><strong>Nama:</strong> ${orderData.name}</p>
			<p><strong>Alamat:</strong> ${orderData.address}</p>
			<p><strong>No WhatsApp:</strong> ${orderData.phone}</p>
			<p><strong>Pembelian:</strong> ${orderData.kg} kg lele</p>
			<p><strong>Total:</strong> ${orderData.total}</p>
			<p><strong>Metode:</strong> ${orderData.method}</p>
		`;

		document.getElementById('waLink').href = waUrl;
	</script>
</body>

</html>
